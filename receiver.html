<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Sphere - Cast Receiver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      background-image: radial-gradient(ellipse at 20% 50%, hsla(220,90%,30%,0.3) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 50%, hsla(280,80%,30%,0.3) 0%, transparent 60%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 32px 48px 0;
    }
    .header svg { width: 48px; height: 48px; }
    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, hsl(220,90%,60%), hsl(280,80%,60%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 0 48px;
    }
    .genre-animation {
      width: 250px;
      height: 250px;
    }
    .genre-animation svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 8px hsla(220,90%,60%,0.5)) drop-shadow(0 0 24px hsla(280,80%,60%,0.3));
    }
    .station-name {
      font-family: 'Poppins', sans-serif;
      font-size: 42px;
      font-weight: 700;
      text-align: center;
      background: linear-gradient(135deg, hsl(220,90%,60%), hsl(280,80%,60%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      max-width: 80%;
      line-height: 1.2;
    }
    .station-tags {
      font-size: 18px;
      color: hsla(0,0%,100%,0.5);
      text-align: center;
    }
    .mini-player {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 48px;
      background: hsla(0,0%,100%,0.05);
      border-top: 1px solid hsla(0,0%,100%,0.1);
      backdrop-filter: blur(12px);
    }
    .mini-player-icon {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: hsla(220,90%,60%,0.2);
      overflow: hidden;
      flex-shrink: 0;
    }
    .mini-player-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .mini-player-info {
      flex: 1;
      min-width: 0;
    }
    .mini-player-name {
      font-weight: 600;
      font-size: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mini-player-status {
      font-size: 13px;
      color: hsla(0,0%,100%,0.4);
    }
    .equalizer {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 24px;
    }
    .eq-bar {
      width: 4px;
      border-radius: 2px;
      background: linear-gradient(to top, hsl(220,90%,60%), hsl(280,80%,60%));
    }
    .eq-bar:nth-child(1) { animation: eq 0.5s ease-in-out infinite alternate; }
    .eq-bar:nth-child(2) { animation: eq 0.7s ease-in-out infinite alternate; height: 16px; }
    .eq-bar:nth-child(3) { animation: eq 0.4s ease-in-out infinite alternate; }
    .eq-bar:nth-child(4) { animation: eq 0.6s ease-in-out infinite alternate; height: 12px; }
    @keyframes eq {
      0% { height: 6px; }
      100% { height: 24px; }
    }
    .footer {
      text-align: center;
      padding: 12px 48px 24px;
      font-size: 13px;
      color: hsla(0,0%,100%,0.25);
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header">
    <svg viewBox="0 0 80 80" fill="none">
      <circle cx="40" cy="40" r="28" stroke="url(#lg)" stroke-width="3">
        <animate attributeName="r" values="26;30;26" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="40" cy="40" r="18" stroke="url(#lg)" stroke-width="2" opacity="0.6">
        <animate attributeName="r" values="16;20;16" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="40" cy="40" r="8" stroke="url(#lg)" stroke-width="2" opacity="0.8">
        <animate attributeName="r" values="7;10;7" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="40" cy="40" r="4" fill="url(#lg)">
        <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <defs>
        <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="hsl(220,90%,60%)"/>
          <stop offset="100%" stop-color="hsl(280,80%,60%)"/>
        </linearGradient>
      </defs>
    </svg>
    <h1>Radio Sphere</h1>
  </div>

  <div class="center">
    <div class="genre-animation" id="genreAnimContainer">
      <svg viewBox="0 0 80 80" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round">
        <line x1="36" y1="68" x2="40" y2="28" stroke-width="2.5"/>
        <circle cx="40" cy="26" r="3" stroke-width="2.5"/>
        <line x1="26" y1="68" x2="46" y2="68" stroke-width="2.5"/>
        <path d="M26,26 A14,14 0 0,1 54,26" stroke-width="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="1s" repeatCount="indefinite"/></path>
        <path d="M18,26 A22,22 0 0,1 62,26" stroke-width="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.4s" repeatCount="indefinite"/></path>
        <path d="M10,26 A30,30 0 0,1 70,26" stroke-width="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite"/></path>
      </svg>
    </div>
    <div class="station-name" id="stationName">En attente...</div>
    <div class="station-tags" id="stationTags"></div>
  </div>

  <div class="mini-player">
    <div class="mini-player-icon" id="miniIcon">
      <img id="miniIconImg" src="" alt="" style="display:none">
    </div>
    <div class="mini-player-info">
      <div class="mini-player-name" id="miniName">--</div>
      <div class="mini-player-status">En lecture</div>
    </div>
    <div class="equalizer">
      <div class="eq-bar" style="height:12px"></div>
      <div class="eq-bar" style="height:18px"></div>
      <div class="eq-bar" style="height:8px"></div>
      <div class="eq-bar" style="height:14px"></div>
    </div>
  </div>

  <div class="footer" id="footerMsg">Contrôlez la lecture depuis votre téléphone</div>

  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <script>
    const S = 'stroke-linecap="round" stroke-linejoin="round" fill="none"';
    const W = 'white';

    const GENRE_SVGS = {
      const GENRE_SVGS = {
      "60s": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <g><animateTransform attributeName="transform" type="rotate" from="0 40 40" to="360 40 40" dur="15s" repeatCount="indefinite"/>
        <circle cx="40" cy="40" r="10" stroke-width="3"/>
        ${[0,60,120,180,240,300].map(a=>`<path d="M40,28 C50,8 30,8 40,28" stroke-width="3" transform="rotate(${a} 40 40)"/>`).join('')}
        </g>
      </svg>`,
      "70s": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <circle cx="40" cy="40" r="26" stroke-width="3"/>
        <path d="M22,22 L58,58 M22,58 L58,22 M40,14 L40,66 M14,40 L66,40" stroke-width="2" opacity="0.6"/>
        <circle cx="40" cy="40" r="32" stroke-width="3" stroke-dasharray="10 10">
          <animateTransform attributeName="transform" type="rotate" from="0 40 40" to="360 40 40" dur="10s" repeatCount="indefinite"/>
        </circle>
      </svg>`,
      "80s": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <rect x="12" y="24" width="56" height="32" rx="4" stroke-width="3"/>
        <circle cx="28" cy="40" r="6" stroke-width="3"><animateTransform attributeName="transform" type="rotate" from="0 28 40" to="360 28 40" dur="3s" repeatCount="indefinite"/></circle>
        <circle cx="52" cy="40" r="6" stroke-width="3"><animateTransform attributeName="transform" type="rotate" from="0 52 40" to="360 52 40" dur="3s" repeatCount="indefinite"/></circle>
        <line x1="36" y1="40" x2="44" y2="40" stroke-width="2"/>
        <path d="M18,56 L62,56" stroke-width="2"/>
      </svg>`,
      "90s": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <circle cx="40" cy="40" r="28" stroke-width="3"/>
        <circle cx="40" cy="40" r="8" stroke-width="3"/>
        <path d="M40,12 A28,28 0 0,1 68,40" stroke-width="3" opacity="0.4"><animateTransform attributeName="transform" type="rotate" from="0 40 40" to="360 40 40" dur="2s" repeatCount="indefinite"/></path>
      </svg>`,
      "ambient": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <path d="M10,50 Q30,30 50,50 T90,50" stroke-width="3" opacity="0.5"><animate attributeName="d" values="M10,50 Q30,30 50,50 T90,50;M10,50 Q30,70 50,50 T90,50;M10,50 Q30,30 50,50 T90,50" dur="6s" repeatCount="indefinite"/></path>
        <path d="M-10,40 Q10,20 30,40 T70,40 T110,40" stroke-width="3"><animate attributeName="d" values="M-10,40 Q10,20 30,40 T70,40 T110,40;M-10,40 Q10,60 30,40 T70,40 T110,40;M-10,40 Q10,20 30,40 T70,40 T110,40" dur="4s" repeatCount="indefinite"/></path>
        <circle cx="40" cy="20" r="6" stroke-width="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/></circle>
      </svg>`,
      "blues": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <rect x="20" y="30" width="40" height="20" rx="4" stroke-width="3"/>
        ${[26,34,42,50].map(x=>`<rect x="${x}" y="30" width="4" height="20" stroke-width="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="${Math.random()*2+1}s" repeatCount="indefinite"/></rect>`).join('')}
      </svg>`,
      "chillout": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <path d="M24,50 C24,65 56,65 56,50 L56,30 L24,30 Z" stroke-width="3"/>
        <path d="M56,36 C64,36 64,46 56,46" stroke-width="3"/>
        <path d="M30,22 Q34,10 38,22 T46,10" stroke-width="3" opacity="0.6"><animate attributeName="d" values="M30,22 Q34,10 38,22 T46,10;M30,22 Q26,10 38,22 T50,10;M30,22 Q34,10 38,22 T46,10" dur="3s" repeatCount="indefinite"/></path>
      </svg>`,
      "classical": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <path d="M34,56 C34,64 46,64 46,56 C46,40 28,40 28,24 C28,12 48,12 48,24" stroke-width="3"/>
        <line x1="38" y1="12" x2="38" y2="68" stroke-width="3"/>
        <circle cx="38" cy="62" r="4" stroke-width="3"/>
        <g opacity="0.4">
          <line x1="16" y1="24" x2="64" y2="24" stroke-width="2"/><line x1="16" y1="32" x2="64" y2="32" stroke-width="2"/><line x1="16" y1="40" x2="64" y2="40" stroke-width="2"/><line x1="16" y1="48" x2="64" y2="48" stroke-width="2"/><line x1="16" y1="56" x2="64" y2="56" stroke-width="2"/>
        </g>
      </svg>`,
      "country": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <path d="M14,56 C14,56 24,48 40,48 C56,48 66,56 66,56" stroke-width="3"/>
        <path d="M26,48 L26,32 C26,20 54,20 54,32 L54,48" stroke-width="3"/>
        <path d="M26,40 L54,40" stroke-width="2"/>
      </svg>`,
      "electronic": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <rect x="14" y="24" width="52" height="32" rx="4" stroke-width="3"/>
        <circle cx="28" cy="40" r="8" stroke-width="3"><animate attributeName="r" values="8;10;8" dur="1s" repeatCount="indefinite"/></circle>
        <circle cx="52" cy="40" r="8" stroke-width="3"><animate attributeName="r" values="8;10;8" dur="1s" repeatCount="indefinite" begin="0.5s"/></circle>
        <line x1="40" y1="36" x2="40" y2="44" stroke-width="2"/>
      </svg>`,
      "funk": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <path d="M24,20 C24,8 56,8 56,20 C56,36 48,36 48,56 C48,64 32,64 32,56 C32,36 24,36 24,20 Z" stroke-width="3"/>
        <line x1="40" y1="20" x2="40" y2="60" stroke-width="2" opacity="0.6"/>
        <line x1="32" y1="24" x2="32" y2="52" stroke-width="2" opacity="0.6"/>
        <line x1="48" y1="24" x2="48" y2="52" stroke-width="2" opacity="0.6"/>
      </svg>`,
      "hiphop": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <rect x="14" y="28" width="52" height="28" rx="2" stroke-width="3"/>
        <circle cx="28" cy="42" r="6" stroke-width="3"><animate attributeName="r" values="5;7;5" dur="0.8s" repeatCount="indefinite"/></circle>
        <circle cx="52" cy="42" r="6" stroke-width="3"><animate attributeName="r" values="5;7;5" dur="0.8s" repeatCount="indefinite"/></circle>
        <path d="M24,28 L24,20 L56,20 L56,28" stroke-width="3"/>
      </svg>`,
      "jazz": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <path d="M30,16 L30,48 C30,58 46,58 46,48 L46,36 C46,26 60,26 60,36 C60,42 54,46 54,46" stroke-width="3"/>
        <path d="M26,20 L34,20 M26,28 L34,28 M26,36 L34,36" stroke-width="2"/>
        <circle cx="60" cy="36" r="6" stroke-width="3"><animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/></circle>
      </svg>`,
      "latin": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <g transform="rotate(-15 40 40)">
          <ellipse cx="32" cy="32" rx="10" ry="14" stroke-width="3"/>
          <line x1="32" y1="46" x2="32" y2="64" stroke-width="3"/>
          <path d="M26,26 L38,26 M26,38 L38,38" stroke-width="2"/>
        </g>
        <g transform="rotate(15 40 40)">
          <ellipse cx="48" cy="32" rx="10" ry="14" stroke-width="3"/>
          <line x1="48" y1="46" x2="48" y2="64" stroke-width="3"/>
        </g>
      </svg>`,
      "metal": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <path d="M46,14 L30,44 L40,44 L34,68 L54,36 L40,36 Z" stroke-width="3">
          <animate attributeName="opacity" values="0.6;1;0.6" dur="0.8s" repeatCount="indefinite"/>
        </path>
      </svg>`,
      "news": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <rect x="24" y="24" width="32" height="12" rx="6" stroke-width="3"/>
        <line x1="40" y1="36" x2="40" y2="56" stroke-width="3"/>
        <path d="M28,56 L52,56" stroke-width="3"/>
        <path d="M30,16 C30,16 36,8 40,8 C44,8 50,16 50,16" stroke-width="3"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite"/></path>
      </svg>`,
      "pop": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <polygon points="40,16 48,32 64,32 52,44 56,60 40,52 24,60 28,44 16,32 32,32" stroke-width="3">
          <animateTransform attributeName="transform" type="scale" values="0.95;1.05;0.95" dur="2s" repeatCount="indefinite" transform-origin="40 40"/>
        </polygon>
      </svg>`,
      "r&b": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <path d="M40,64 C40,64 16,46 16,30 C16,20 28,16 36,24 L40,28 L44,24 C52,16 64,20 64,30 C64,46 40,64 40,64 Z" stroke-width="3">
          <animateTransform attributeName="transform" type="scale" values="0.95;1.05;0.95" dur="1.5s" repeatCount="indefinite" transform-origin="40 40"/>
        </path>
      </svg>`,
      "reggae": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <path d="M24,28 L56,28 L50,60 L30,60 Z" stroke-width="3"/>
        <ellipse cx="40" cy="28" rx="16" ry="6" stroke-width="3"/>
        <ellipse cx="40" cy="60" rx="10" ry="4" stroke-width="3"/>
        <path d="M30,28 L34,60 M50,28 L46,60" stroke-width="2" opacity="0.5"/>
      </svg>`,
      "rock": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <g transform="rotate(45 40 40)">
          <path d="M32,48 C32,36 48,36 48,48 C48,60 32,60 32,48 Z" stroke-width="3"/>
          <rect x="36" y="16" width="8" height="24" stroke-width="3"/>
          <line x1="30" y1="12" x2="50" y2="12" stroke-width="3"/>
        </g>
      </svg>`,
      "soul": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <rect x="30" y="20" width="20" height="28" rx="10" stroke-width="3"/>
        <path d="M22,36 C22,50 30,56 40,56 C50,56 58,50 58,36" stroke-width="3"/>
        <line x1="40" y1="56" x2="40" y2="68" stroke-width="3"/>
        <line x1="32" y1="68" x2="48" y2="68" stroke-width="3"/>
      </svg>`,
      "techno": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <path d="M20,40 L30,20 L40,60 L50,30 L60,40" stroke-width="3" stroke-linejoin="miter"/>
        <circle cx="20" cy="40" r="4" stroke-width="3"/><circle cx="60" cy="40" r="4" stroke-width="3"/>
        <rect x="12" y="12" width="56" height="56" rx="8" stroke-width="3" opacity="0.3"/>
      </svg>`,
      "trance": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <circle cx="40" cy="40" r="24" stroke-width="3"><animate attributeName="r" values="20;28;20" dur="3s" repeatCount="indefinite"/></circle>
        <circle cx="40" cy="40" r="14" stroke-width="3"><animate attributeName="r" values="10;18;10" dur="3s" repeatCount="indefinite" begin="1s"/></circle>
        <circle cx="40" cy="40" r="4" fill="${W}"/>
      </svg>`,
      "world": `<svg viewBox="0 0 80 80" fill="none" stroke="${W}" ${S}>
        <circle cx="40" cy="40" r="28" stroke-width="3"/>
        <ellipse cx="40" cy="40" rx="12" ry="28" stroke-width="2"><animateTransform attributeName="transform" type="rotate" from="0 40 40" to="360 40 40" dur="15s" repeatCount="indefinite"/></ellipse>
        <line x1="12" y1="40" x2="68" y2="40" stroke-width="2"/>
      </svg>`
    };

    const GENRE_KEYWORDS = Object.keys(GENRE_SVGS);

    function detectGenre(tags) {
      if (!tags || !Array.isArray(tags)) return null;
      const joined = tags.join(' ').toLowerCase();
      for (const g of GENRE_KEYWORDS) {
        if (joined.includes(g)) return g;
      }
      const map = {
        'hip hop': 'hiphop', 'hip-hop': 'hiphop', 'rap': 'hiphop',
        'rnb': 'r&b', 'rhythm': 'r&b',
        'classic': 'classical', 'orchestra': 'classical', 'symphony': 'classical',
        'chill': 'chillout', 'lounge': 'chillout', 'relax': 'ambient',
        'edm': 'electronic', 'house': 'electronic', 'dance': 'electronic',
        'hard rock': 'rock', 'alternative': 'rock', 'indie': 'rock',
        'death': 'metal', 'heavy': 'metal', 'punk': 'rock',
        'salsa': 'latin', 'cumbia': 'latin', 'merengue': 'latin', 'bachata': 'latin',
        'dub': 'reggae', 'ska': 'reggae',
        'gospel': 'soul', 'motown': 'soul',
        'disco': 'funk',
        'information': 'news', 'talk': 'news', 'sport': 'news',
        'psytrance': 'trance', 'progressive': 'trance',
        'minimal': 'techno', 'industrial': 'techno'
      };
      for (const [key, val] of Object.entries(map)) {
        if (joined.includes(key)) return val;
      }
      return null;
    }

    function setGenreAnimation(genre) {
      const container = document.getElementById('genreAnimContainer');
      if (genre && GENRE_SVGS[genre]) {
        container.innerHTML = GENRE_SVGS[genre];
      }
    }

    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      request => {
        const media = request.media;
        if (media) {
          const title = media.metadata?.title || 'Station';
          const imageUrl = media.metadata?.images?.[0]?.url || '';
          const tags = media.customData?.tags || [];

          document.getElementById('stationName').textContent = title;
          document.getElementById('miniName').textContent = title;

          const tagsEl = document.getElementById('stationTags');
          if (tags.length > 0) {
            tagsEl.textContent = tags.slice(0, 4).join(' \u2022 ');
          } else {
            tagsEl.textContent = '';
          }

          const iconImg = document.getElementById('miniIconImg');
          if (imageUrl) {
            iconImg.src = imageUrl.replace('http://', 'https://');
            iconImg.style.display = 'block';
            iconImg.onerror = () => { iconImg.style.display = 'none'; };
          } else {
            iconImg.style.display = 'none';
          }

          const genre = detectGenre(tags);
          setGenreAnimation(genre);
        }
        return request;
      }
    );

    context.start();
  </script>
</body>
</html>
