<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Sphere – Privacy Policy / Politique de Confidentialité</title>
    <meta name="description" content="Privacy Policy for the Radio Sphere mobile application – all languages.">
    <style>
        :root {
            --bg-color: #0b0b14;
            --card-bg: rgba(25, 25, 45, 0.6);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-start: #4a90ff;
            --accent-end: #a855f7;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, rgba(74, 144, 255, 0.1), transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .header p { 
            font-size: 0.9rem; 
            color: var(--text-muted); 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .lang-switcher {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .lang-btn {
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .lang-btn:hover { 
            border-color: rgba(255, 255, 255, 0.3); 
            color: #fff;
            transform: translateY(-1px);
        }

        .lang-btn.active {
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        .lang-section { 
            display: none; 
            animation: fadeIn 0.4s ease-out forwards;
        }

        .lang-section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .policy h2 {
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 0.2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .policy .date {
            font-size: 0.85rem;
            color: var(--accent-start);
            margin-bottom: 2rem;
            display: block;
            margin-top: 1rem;
        }

        .policy p {
